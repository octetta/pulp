name: Analysis sources

on:
  pull_request:
  push:

jobs:
  generated-source-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev ninja-build

      - name: Verify canonical generated C sources
        working-directory: parts
        run: make analysis-check
