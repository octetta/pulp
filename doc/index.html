<!DOCTYPE html>
<html>
<head>
    <title>wasm-skred shell</title>

    <style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

:root {
    --atari-blue: #0042ff;
    --atari-dark: #001a66;
    --atari-gold: #ffd700;
    --atari-light: #90b0ff;
    --atari-rust: #A03000;
    --atari-grass: #afff00;
    --bar-bg: #1a2a1a; 
}

body {
    background-color: #000000; 
    display: flex;
    flex-direction: column;
    height: 100dvh; 
    margin: 0;
    overflow: hidden; 
}

#terminal-container {
    background-color: var(--atari-blue);
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

#output {
    flex-grow: 1;
    overflow-y: auto;
    padding: 20px;
    white-space: pre-wrap;
    line-height: 1.5;
    -webkit-overflow-scrolling: touch; 
}

.terminal-spacer {
    height: 70%;
    width: 100%;
}

/* Function Bar: Text-field style between entry and status */
#function-bar {
    display: flex;
    background: var(--bar-bg); /* Use the new variable here */
    border-top: 1px solid rgba(144, 176, 255, 0.3);
    flex-shrink: 0;
    height: 44px;
    align-items: stretch;
    /* Optional: adds a subtle "input field" depth */
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); 
}

#function-bar button {
    background: transparent;
    border: none;
    border-right: 1px solid rgba(144, 176, 255, 0.2);
    color: var(--atari-light);
    font-family: 'Press Start 2P', cursive;
    font-size: 11px;
    cursor: pointer;
    flex: 1;
    transition: background 0.1s;
    outline: none;
    white-space: nowrap;
}

#function-bar button:active {
    background: var(--atari-light);
    color: var(--bar-purple);
}

.input-line {
    display: flex;
    align-items: center;
    padding: 15px 20px;
    background: var(--atari-dark);
    flex-shrink: 0;
}

#output, #cmdInput, .prompt, .status-bar, .extra-line {
    font-family: 'Press Start 2P', cursive;
    font-size: 16px; 
    color: var(--atari-light);
}

#cmdInput {
    background: transparent;
    border: none;
    outline: none;
    flex-grow: 1;
    color: #ffffff;
    font-size: 16px; 
}

.status-bar {
    padding: 10px 20px;
    background: var(--atari-dark);
    color: var(--atari-gold);
    display: flex;
    gap: 10px;
    flex-shrink: 0;
    font-size: 12px;
    border-top: 2px solid #000;
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
}

#engine-left { flex: 1; white-space: nowrap; }
#engine-center { 
    flex: 2; 
    font-size: 9px; 
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--atari-light);
}
#engine-status { flex: 1; text-align: right; white-space: nowrap; }

@media (max-width: 600px) {
    #output, .prompt, #cmdInput { font-size: 12px; }
    .status-bar { font-size: 9px; }
    #function-bar button { font-size: 9px; }
}

.system { color: var(--atari-gold); }
.error { color: var(--atari-rust); }
.info { color: var(--atari-grass); }
.dim { color: #ffffff; }
    </style>
</head>
<body>

    <div id="terminal-container">
        <div id="output">
          <div class="terminal-spacer"></div>
Welcome to the skred shell
Type <span class="system">'boot'</span> to initialize audio engine.
Type <span class="system">'help'</span> for engine features.
        </div>

        <div class="input-line">
            <span class="prompt">#&nbsp;</span>
            <input type="text" id="cmdInput" autofocus spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off">
        </div>

        <div id="function-bar">
            <button id="btnLeft">&lt;</button>
            <button id="histUp">UP</button>
            <button id="histDown">DN</button>
            <button id="btnRight">&gt;</button>
            <button class="funcNum" data-val="0">0</button>
            <button class="funcNum" data-val="1">1</button>
            <button class="funcNum" data-val="2">2</button>
            <button class="funcNum" data-val="3">3</button>
            <button class="funcNum" data-val="4">4</button>
            <button class="funcNum" data-val="5">5</button>
            <button class="funcNum" data-val="6">6</button>
            <button class="funcNum" data-val="7">7</button>
            <button class="funcNum" data-val="8">8</button>
            <button class="funcNum" data-val="9">9</button>
        </div>

        <div class="status-bar">
            <span id="engine-left">wasm-skred 0.5.0</span>
            <span id="engine-center">log 0</span>
            <span id="engine-status">AUDIO OFF</span>
        </div>
    </div>

    <script src="skred_api.js"></script>

<script>
var bufsize = 1024;
var nvoices = 16;
var running = 0;

function usage() {
  printToTerminal("QUICK REF", 'info');
  printToTerminal("boot (voice-count) (callback-frame-count)");
  printToTerminal("load # select a wav file");
  printToTerminal(`v(0..${nvoices}) # select voice`);
  printToTerminal("w(0..26)   # select waveform");
  printToTerminal("a(-60..10) # set amplitide (dB)");
  printToTerminal("f(0..1760) # set frequency (Hz)");
  printToTerminal("n(0..127)  # set frequency by MIDI note");
  printToTerminal("t A D S R  # set amp envelope (A,D,R in secs)");
  printToTerminal("l(0..4)    # trigger ADSR with velocity");
  printToTerminal("p(-1..1)   # pan in stereo");
  printToTerminal("{v0l1}e>0  # store {string} to macro-0");
  printToTerminal("(played when '0' button pressed)");
}

const logo = `
     _                 _ 
 ___| | ___ __ ___  __| |
/ __| |/ / '__/ _ \\/ _  |
\\__ \\   <| | |  __/ (_| |
|___/_|\\_\\_|  \\___|\\__,_|
`;

const output = document.getElementById('output');
const cmdInput = document.getElementById('cmdInput');
const statusSpan = document.getElementById('engine-status');
const centerSpan = document.getElementById('engine-center');

let commandHistory = [];
let historyIndex = -1;

function printToTerminal(text, className = '') {
    const line = document.createElement('div');
    if (className) line.className = className;
    line.textContent = text;
    output.appendChild(line);
    output.scrollTop = output.scrollHeight;
}

cmdInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        const rawCmd = cmdInput.value.trim();
        if (!rawCmd) return;
        if (commandHistory[commandHistory.length - 1] !== rawCmd) commandHistory.push(rawCmd);
        historyIndex = -1;
        printToTerminal(rawCmd, 'dim');
        processCommand(rawCmd);
        cmdInput.value = '';
    } 
    else if (e.key === 'ArrowUp') {
        if (commandHistory.length > 0) {
            if (historyIndex === -1) historyIndex = commandHistory.length - 1;
            else if (historyIndex > 0) historyIndex--;
            cmdInput.value = commandHistory[historyIndex];
            setTimeout(() => cmdInput.setSelectionRange(cmdInput.value.length, cmdInput.value.length), 0);
        }
        e.preventDefault();
    } 
    else if (e.key === 'ArrowDown') {
        if (historyIndex !== -1) {
            if (historyIndex < commandHistory.length - 1) {
                historyIndex++;
                cmdInput.value = commandHistory[historyIndex];
            } else {
                historyIndex = -1;
                cmdInput.value = '';
            }
        }
        e.preventDefault();
    }
});

function processCommand(cmd) {
    const action = cmd.split(' ')[0].toLowerCase();
    var arg = cmd.split(' ');

    switch(action) {
        case 'boot':
            if (running) {
                printToTerminal(`Error: already running.`, 'error');
                return;
            }
            printToTerminal(logo, 'info');
            if (arg.length > 1) {
                var n = Number(arg[1]);
                if (n > 0 && n < 32) nvoices = n;
                if (arg.length > 2) {
                    n = Number(arg[2]);
                    if (n >= 128) bufsize = n;
                }
            }
            try {
                Module._skred_set_audio_device(0, 0); // hack... force standard in/out devices?!?
                const result = Module._skred_start(bufsize, nvoices, 0); 
                printToTerminal(`skred_start() = ${result}`, 'system');
                statusSpan.innerText = `AUDIO ON ${nvoices} ${bufsize}`;
                statusSpan.style.color = "var(--atari-grass)";
                const ptr = Module._skred_features();
                printToTerminal(`${Module.UTF8ToString(ptr)}`);
                Module.ccall('skred_command', null, ['string'], ["log 1"]);
                centerSpan.innerText = "log 1";
                running = 1;
            } catch(e) {
                printToTerminal(`Error: Could not boot.`, 'error');
            }
            break;

        case 'stop':
            Module._skred_stop();
            printToTerminal("System: Engine stopped.", "system");
            statusSpan.innerText = "AUDIO OFF";
            statusSpan.style.color = "#aaa";
            running = 0;
            break;
        case 'help': usage(); break;
        case 'load': addWavViaDialog(); break;
        case 'clear': output.innerHTML = ''; break;

        default:
            if (!running) {
                printToTerminal("Error: Engine must be 'boot'ed first.");
            } else {
                Module.ccall('skred_command', null, ['string'], [cmd]);
                const ptr = Module._skred_log();
                const log = Module.UTF8ToString(ptr);
                if (log != "") printToTerminal(log, 'info');
            }
            break;
    }
}

function sendSkredCommand(cmd) {
    Module.ccall('skred_command', null, ['string'], [cmd]);
    const ptr = Module._skred_log();
    const log = Module.UTF8ToString(ptr);
    if (log !== "") {
        printToTerminal(log, 'info');
    }
}

function handleFuncBtn(action) {
    let pos = cmdInput.selectionStart;
    switch(action) {
        case 'left':
            if (pos > 0) cmdInput.setSelectionRange(pos - 1, pos - 1);
            break;
        case 'right':
            if (pos < cmdInput.value.length) cmdInput.setSelectionRange(pos + 1, pos + 1);
            break;
        case 'up':
            cmdInput.dispatchEvent(new KeyboardEvent('keydown', { key: 'ArrowUp' }));
            break;
        case 'down':
            cmdInput.dispatchEvent(new KeyboardEvent('keydown', { key: 'ArrowDown' }));
            break;
        case '0': case '1': case '2': case '3': case '4': 
        case '5': case '6': case '7': case '8': case '9':
            // send e!# which does whatever
            // {v0l1}e>0 for example...
            sendSkredCommand(`e!${action}`);
            break;
    }
    cmdInput.focus();
}

document.getElementById('btnLeft').addEventListener('pointerdown', (e) => { e.preventDefault(); handleFuncBtn('left'); });
document.getElementById('btnRight').addEventListener('pointerdown', (e) => { e.preventDefault(); handleFuncBtn('right'); });
document.getElementById('histUp').addEventListener('pointerdown', (e) => { e.preventDefault(); handleFuncBtn('up'); });
document.getElementById('histDown').addEventListener('pointerdown', (e) => { e.preventDefault(); handleFuncBtn('down'); });
document.querySelectorAll('.funcNum').forEach(btn => {
    btn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        handleFuncBtn(btn.getAttribute('data-val'));
    });
});

document.addEventListener('click', () => cmdInput.focus());

let waveFileCounter = 300;
const MIN_WAV = 300;
const MAX_WAV = 999;

async function addWavViaDialog() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.mp3,.wav';
    input.multiple = false;

    input.onchange = async (e) => {
        const files = e.target.files;
        if (!files.length) return;
        const file = files[0];
        
        try {
            const buffer = await file.arrayBuffer();
            const fileName = `${waveFileCounter}.wav`;
            Module.FS.writeFile(fileName, new Uint8Array(buffer));
            
            // Re-applying the explicit display string
            // centerSpan.innerText = `{${file.name}} /ws ${waveFileCounter}`;
            printToTerminal(`{${file.name}} /ws ${waveFileCounter}`, 'info');

            
            Module.ccall('skred_command', null, ['string'], [`/w${waveFileCounter},${waveFileCounter}`]);
            
            waveFileCounter++;
            if (waveFileCounter > MAX_WAV) waveFileCounter = MIN_WAV;
        } catch (err) {
            console.error(`Failed to load ${file.name}:`, err);
        }
    };
    input.click();
}
</script>
</body>
</html>
