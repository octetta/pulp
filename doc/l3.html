<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skred Engine - Interactive Tutorial</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --cell-bg: #ffffff;
            --code-bg: #000000;
            --code-fg: #f1f1f1;
            --output-bg: #111111;
            --output-fg: #00ff00; /* Terminal green for logs */
            --text-color: #1a1a1a;
            --border-color: #000000;
            --brand-color: #2563eb;
            --gutter-bg: #f8f8f8;
            --radius: 2px; 
        }

        body {
            font-family: "SF Mono", "Fira Code", monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 0; line-height: 1.4;
        }

        /* Top Bar - Minimalist/Industrial */
        .top-bar {
            position: sticky; top: 0;
            background: #fff;
            border-bottom: 2px solid var(--border-color);
            padding: 10px 20px;
            display: flex; align-items: center; gap: 15px;
            z-index: 100;
        }

        .top-bar h1 { margin: 0; font-size: 0.9rem; font-weight: 900; text-transform: uppercase; margin-right: auto; }

        button {
            display: inline-flex; align-items: center; gap: 6px;
            background: #fff; border: 1px solid var(--border-color);
            padding: 4px 10px; border-radius: var(--radius);
            font-size: 0.75rem; font-weight: 700; cursor: pointer;
            text-transform: uppercase;
        }

        button:hover:not(:disabled) { background: #000; color: #fff; }
        #btn-start { background: var(--border-color); color: white; }
        
        .notebook { max-width: 900px; margin: 20px auto; padding: 0 20px; }

        /* Typography */
        .text-cell { padding: 20px 50px; }
        .text-cell h2 { font-size: 1.2rem; border-bottom: 2px solid #000; padding-bottom: 4px; margin-top: 2.5em; }
        .text-cell p { font-family: system-ui, sans-serif; font-size: 1rem; color: #333; }
        .text-cell code { background: #eee; padding: 2px 4px; border-radius: var(--radius); font-size: 0.9em; }

        /* Code Blocks */
        .code-cell {
            display: flex; border: 2px solid var(--border-color);
            border-radius: var(--radius); overflow: hidden; background: var(--code-bg);
            margin: 10px 0 30px 0;
        }

        .gutter {
            width: 50px; background: var(--gutter-bg);
            border-right: 2px solid var(--border-color);
            display: flex; justify-content: center; padding-top: 12px;
        }

        .run-btn {
            background: transparent; border: none; color: #000;
            cursor: pointer; width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
        }
        .run-btn svg { width: 20px; height: 20px; fill: currentColor; }

        .editor-area { flex-grow: 1; display: flex; flex-direction: column; }

        textarea {
            width: 100%; min-height: 40px; background: transparent;
            color: var(--code-fg); border: none; padding: 16px;
            font-family: inherit; font-size: 14px; outline: none; resize: vertical;
        }

        .output-area {
            background: var(--output-bg);
            color: var(--output-fg);
            font-family: inherit;
            font-size: 12px;
            padding: 0 16px;
            white-space: pre-wrap;
            border-top: 1px solid #333;
            display: none;
        }
        .output-area.active { padding: 12px 16px; display: block; }

        .status-dot { width: 10px; height: 10px; border: 1px solid #000; background: #ccc; }
        .status-dot.active { background: #00ff00; }
    </style>
</head>
<body>

    <div class="top-bar">
        <h1>Skred Engine Lab</h1>
        <div class="status-dot" id="status-indicator"></div>
        <button id="btn-start">Start</button>
        <button id="btn-stop" disabled>Stop</button>
        <button id="btn-quiet">Quiet</button>
    </div>

    <div id="notebook-container" class="notebook"></div>

    <template data-type="markdown">
## 0. Initialize Logging
To see output in this notebook, we first need to enable the engine's logging system.
    </template>
    <template data-type="code">log 0</template>

    <template data-type="markdown">
## 1. Frequency and Variables
Variables in Skred are single uppercase letters. Let's assign a frequency to `A` and check the status.
    </template>
    <template data-type="code">A: 440
??</template>

    <template data-type="markdown">
## 2. Voice Inspection
The `??` command reveals the state of running voices.
    </template>
    <template data-type="code">??</template>

    <script src="skred_api.js"></script>

    <script>
        const container = document.getElementById('notebook-container');
        const templates = document.querySelectorAll('template');

        // Render sections
        templates.forEach(template => {
            const type = template.getAttribute('data-type');
            const content = template.innerHTML.trim();

            if (type === 'markdown') {
                const section = document.createElement('div');
                section.className = 'text-cell';
                section.innerHTML = marked.parse(content);
                container.appendChild(section);
            } else if (type === 'code') {
                const cell = document.createElement('div');
                cell.className = 'code-cell';
                cell.innerHTML = `
                    <div class="gutter">
                        <button class="run-btn" title="Run (Ctrl+Enter)">
                            <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                        </button>
                    </div>
                    <div class="editor-area">
                        <textarea spellcheck="false" rows="${content.split('\n').length}">${content}</textarea>
                        <div class="output-area"></div>
                    </div>
                `;
                container.appendChild(cell);
            }
        });

        const btnStart = document.getElementById('btn-start');
        const btnStop = document.getElementById('btn-stop');
        const btnQuiet = document.getElementById('btn-quiet');
        const statusDot = document.getElementById('status-indicator');
        let isRunning = false;

        btnStart.onclick = () => {
            if (typeof Module !== 'undefined' && Module._skred_start) {
                Module._skred_start(128, 16, 0);
                isRunning = true;
                btnStart.disabled = true;
                btnStop.disabled = false;
                statusDot.classList.add('active');
                
                // Auto-enable logging on start
                Module.ccall('skred_command', null, ['string'], ['log 0']);
            }
        };

        btnStop.onclick = () => {
            Module._skred_stop();
            isRunning = false;
            btnStart.disabled = false;
            btnStop.disabled = true;
            statusDot.classList.remove('active');
        };

        btnQuiet.onclick = () => {
            if(isRunning) Module.ccall('skred_command', null, ['string'], ['q']);
        };

        // Execution logic with logging integration
        document.addEventListener('click', (e) => {
            const runBtn = e.target.closest('.run-btn');
            if (!runBtn) return;

            if (!isRunning) {
                alert("Engine Offline");
                return;
            }

            const cell = runBtn.closest('.code-cell');
            const textarea = cell.querySelector('textarea');
            const outputArea = cell.querySelector('.output-area');
            const commands = textarea.value.split('\n');
            
            let combinedLog = "";

            commands.forEach(line => {
                const cmd = line.trim();
                if (cmd) {
                    // 1. Execute Command
                    Module.ccall('skred_command', null, ['string'], [cmd]);
                    
                    // 2. Retrieve Log Buffer
                    const ptr = Module._skred_log();
                    const log = Module.UTF8ToString(ptr);
                    
                    if (log && log.trim() !== "") {
                        combinedLog += log + "\n";
                    }
                }
            });

            if (combinedLog.trim()) {
                outputArea.textContent = combinedLog.trim();
                outputArea.classList.add('active');
            } else {
                outputArea.classList.remove('active');
            }
        });

        // Keybindings
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                if (e.target.tagName === 'TEXTAREA') {
                    e.target.closest('.code-cell').querySelector('.run-btn').click();
                }
            }
        });
    </script>
</body>
</html>
