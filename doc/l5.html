<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skred Engine Lab</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>

    <style>
        :root {
            /* Light Mode Variables */
            --bg: #ffffff;
            --fg: #1a1a1a;
            --border: #000000;
            --gutter-bg: #f8f8f8;
            --code-bg: #000000;
            --code-fg: #f1f1f1;
            --output-bg: #111111;
            --output-fg: #00ff00;
            --accent: #2563eb;
            --radius: 2px;
        }

        body.dark-mode {
            /* Dark Mode Variables */
            --bg: #0c0c0c;
            --fg: #e4e4e7;
            --border: #27272a;
            --gutter-bg: #18181b;
            --code-bg: #000000;
            --code-fg: #f1f1f1;
            --output-bg: #000000;
            --output-fg: #4ade80;
        }

        body {
            font-family: "SF Mono", "Fira Code", monospace;
            background-color: var(--bg);
            color: var(--fg);
            margin: 0; padding: 0; line-height: 1.4;
            transition: background-color 0.2s, color 0.2s;
        }

        /* Nav Bar Styles */
        .top-bar {
            position: sticky; top: 0;
            background: var(--bg);
            border-bottom: 2px solid var(--border);
            padding: 8px 20px;
            display: flex; align-items: center; gap: 12px;
            z-index: 100;
        }

        .top-bar h1 { margin: 0; font-size: 0.8rem; font-weight: 900; text-transform: uppercase; margin-right: auto; }

        .nav-btn {
            background: var(--bg); color: var(--fg);
            border: 1px solid var(--border);
            padding: 4px 10px; border-radius: var(--radius);
            font-size: 0.7rem; font-weight: 700; cursor: pointer;
            text-transform: uppercase;
        }

        .nav-btn:hover { background: var(--fg); color: var(--bg); }
        #btn-start { background: var(--border); color: var(--bg); }

        /* The Theme Toggle Widget */
        #theme-toggle { padding: 4px 8px; font-size: 1rem; }

        .notebook { max-width: 900px; margin: 20px auto; padding: 0 20px; }

        /* Typography */
        .text-cell { padding: 15px 0; max-width: 750px; }
        .text-cell h2 { font-size: 1.1rem; border-bottom: 2px solid var(--border); padding-bottom: 4px; margin-top: 2em; text-transform: uppercase; }
        .text-cell p { font-family: system-ui, sans-serif; font-size: 1rem; color: var(--fg); opacity: 0.85; }

        /* Mermaid Graph Styling */
        .mermaid-container {
            margin: 20px 0; padding: 20px;
            border: 1px solid var(--border);
            background: #fff; /* Graphs usually need a white bg for contrast */
            border-radius: var(--radius);
        }
        body.dark-mode .mermaid-container { filter: invert(0.92) hue-rotate(180deg); }

        /* Execution Cells */
        .code-cell {
            display: flex; border: 2px solid var(--border);
            border-radius: var(--radius); overflow: hidden; background: var(--code-bg);
            margin: 10px 0 30px 0;
        }

        .gutter {
            width: 45px; background: var(--gutter-bg);
            border-right: 2px solid var(--border);
            display: flex; justify-content: center; padding-top: 10px;
        }

        .run-btn { background: transparent; border: none; color: var(--accent); cursor: pointer; }
        .run-btn svg { width: 18px; height: 18px; fill: currentColor; }

        textarea {
            width: 100%; min-height: 40px; background: transparent;
            color: var(--code-fg); border: none; padding: 16px;
            font-family: inherit; font-size: 14px; outline: none; resize: vertical;
        }

        .output-area {
            background: var(--output-bg); color: var(--output-fg);
            font-family: inherit; font-size: 12px; padding: 0 16px;
            white-space: pre-wrap; border-top: 1px solid var(--border);
            display: none;
        }
        .output-area.active { padding: 12px 16px; display: block; }

        .status-dot { width: 8px; height: 8px; border: 1px solid var(--border); background: #555; }
        .status-dot.active { background: #00ff00; box-shadow: 0 0 5px #00ff00; }
    </style>
</head>
<body>

    <div class="top-bar">
        <h1>Skred // Lab</h1>
        <div class="status-dot" id="status-indicator"></div>
        <button id="btn-start" class="nav-btn">Start</button>
        <button id="btn-stop" class="nav-btn" disabled>Stop</button>
        <button id="btn-quiet" class="nav-btn">Quiet</button>
        <button id="theme-toggle" class="nav-btn" title="Toggle Light/Dark Mode">◑</button>
    </div>

    <div id="notebook-container" class="notebook"></div>

<template data-type="markdown">
## Engine Architecture
The following diagram describes the flow of control messages from the UI to the sound engine.
</template>

<template data-type="mermaid">
graph LR
    UI[HTML Interface] -->|ccall| WASM(Skred Engine)
    WASM -->|log| UI
    WASM -->|buffer| Audio(Hardware)
</template>

<template data-type="markdown">
## Oscillator Control
Use `f` to set frequency. Note that variables must be single uppercase letters.
</template>

<template data-type="code">
v0 a0 l1 f220
??
</template>

    <script src="skred_api.js"></script>

    <script>
        // 1. Initialize Mermaid
        mermaid.initialize({ startOnLoad: false, theme: 'neutral' });

        const container = document.getElementById('notebook-container');
        const templates = document.querySelectorAll('template');

        // 2. Rendering Loop
        templates.forEach(async (template) => {
            const type = template.dataset.type;
            const content = template.innerHTML.trim();

            if (type === 'markdown') {
                const div = document.createElement('div');
                div.className = 'text-cell';
                div.innerHTML = marked.parse(content);
                container.appendChild(div);
            } 
            else if (type === 'mermaid') {
                const wrapper = document.createElement('div');
                wrapper.className = 'mermaid-container';
                wrapper.innerHTML = `<pre class="mermaid">${content}</pre>`;
                container.appendChild(wrapper);
                await mermaid.run();
            }
            else if (type === 'code') {
                const cell = document.createElement('div');
                cell.className = 'code-cell';
                cell.innerHTML = `
                    <div class="gutter"><button class="run-btn"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg></button></div>
                    <div class="editor-area">
                        <textarea spellcheck="false" rows="${content.split('\n').length}">${content}</textarea>
                        <div class="output-area"></div>
                    </div>
                `;
                container.appendChild(cell);
            }
        });

        // 3. Theme Logic
        const themeBtn = document.getElementById('theme-toggle');
        themeBtn.onclick = () => {
            document.body.classList.toggle('dark-mode');
        };

        // 4. Engine Controls
        const btnStart = document.getElementById('btn-start');
        const btnStop = document.getElementById('btn-stop');
        const statusDot = document.getElementById('status-indicator');
        let isRunning = false;

        btnStart.onclick = () => {
            if (typeof Module !== 'undefined' && Module._skred_start) {
                Module._skred_start(128, 16, 0);
                isRunning = true;
                btnStart.disabled = true; btnStop.disabled = false;
                statusDot.classList.add('active');
                Module.ccall('skred_command', null, ['string'], ['log 1']);
            }
        };

        btnStop.onclick = () => {
            Module._skred_stop();
            isRunning = false;
            btnStart.disabled = false; btnStop.disabled = true;
            statusDot.classList.remove('active');
        };

        document.getElementById('btn-quiet').onclick = () => {
            if(isRunning) Module.ccall('skred_command', null, ['string'], ['S256']);
        };

        // 5. Code Execution & Log Polling
        document.addEventListener('click', (e) => {
            const runBtn = e.target.closest('.run-btn');
            if (!runBtn || !isRunning) return;

            const cell = runBtn.closest('.code-cell');
            const textarea = cell.querySelector('textarea');
            const outputArea = cell.querySelector('.output-area');
            const lines = textarea.value.split('\n');
            let combinedLog = "";

            lines.forEach(line => {
                const cmd = line.trim();
                if (cmd) {
                    Module.ccall('skred_command', null, ['string'], [cmd]);
                    const ptr = Module._skred_log();
                    const log = Module.UTF8ToString(ptr);
                    if (log && log.trim()) combinedLog += log + "\n";
                }
            });

            if (combinedLog.trim()) {
                outputArea.textContent = combinedLog.trim();
                outputArea.classList.add('active');
            } else {
                outputArea.classList.remove('active');
            }
        });
    </script>
</body>
</html>
