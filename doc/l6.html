<template data-type="markdown">
## What is this?

`skred` is a sound engine that work on Linux, macOS, MSWindows, and WASM.

`skode` is the short-hand notation that tells `skred` how to make sounds
and how to change a sound's character over time.

## Why are you doing it this way?

I've always wanted a simple way to play with sounds of my imagination. I'm highly
influenced by the analog and digital music synthesizers of the 80's and that will
show up throughout this document.

Anyway, to achieve this, I wanted something low-ceremony, meaning simple to enter that
doesn't require much thinking once you remember a few symbols.

I like to think about it this way... how do you think about these things?...

- Element symbols on a periodic table : `Hg` `H2O` `Pb`

- Greek letters in math notations : &#8721;

- Abbreviations like `ls` or `dir` or `catalog` used at a command prompt

- LOL or WTF, right?

These things look weird until they don't, and in my opinion their tersness
frees up mental space so you think more about what you want to do rather
than how to spell something or the finger gymnastics to enter it.

Something we'll visit later is it becomes easy to use other tools to send
things like this when you grow beyond the basics.

*A quick acknowledgement : `skode` is highly influenced by the [AMY](https://github.com/shorepine/amy)
audio project, but implemented independently, with my own (questionable!?) goals... thanks
Brian and dAN for the inpiration and openess and kindness.*

I'll talk about the `skred` sound engine in some detail later in this document, but let's
get you thinking about sound differently by trying a few simple things.

</template>

## Let's make a sound!

First off, press the START button on the top of the page to get `skred` running.
This may ask your permission to record audio. This allows `skred` to record
audio (under your control) for use as sound samples. If you stick around we'll
learn about that later.

*If at any point the sound is unpleasant or unwanted, you can stop it with the
STOP button, which totally stops `skred` running, or by QUIET, which sends
a `skode` command to return `skred` to its initial quiet state, essentially
zero-ing out anything that was resulting in sound output.*

With that out of the way, let's get started by clicking the play button next to

## What did we enter?

I'll break down the original `skode` block `v0 w0 a0 f440 l1`

### `v0` = voice

`v0` means: select a "voice" we want to change... think of this like one person in
a chorus of people. This says select or point to voice 0.

`skred` can have many voices depending on how it's setup, but in this learning tool,
it has 16 active.

### `w0` = waveform

`w0` means: whatever voice we're pointed at, let it use waveform "0"... what is
waveform "0" you ask?

`w0` is a sine wave. Is looks the letter S lying down on it's side.
You heard it by playing with it above, and some describe whistling as a kind of sinewave.

`skred` has 26 built-in waveforms (not totally the truth, but I'll explain that
later).

Here are the top seven for easy listening...

<script src="skred_api.js"></script>

<script>
  mermaid.initialize({ startOnLoad: false, theme: 'neutral' });
  const container = document.getElementById('notebook-container');
  const templates = document.querySelectorAll('template');

  // Render Templates
  templates.forEach(async (template) => {
    const type = template.dataset.type;
    const content = template.innerHTML.trim();

    if (type === 'markdown') {
      const div = document.createElement('div');
      div.className = 'text-cell';
      div.innerHTML = marked.parse(content);
      container.appendChild(div);
    } 
    else if (type === 'mermaid') {
      const wrapper = document.createElement('div');
      wrapper.className = 'mermaid-container';
      wrapper.innerHTML = `<pre class="mermaid">${content}</pre>`;
      container.appendChild(wrapper);
      await mermaid.run();
    }
    else if (type === 'code') {
      const cell = document.createElement('div');
      cell.className = 'code-cell';
      cell.innerHTML = `
        <div class="gutter"><button class="run-btn"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg></button></div>
        <div class="editor-area">
          <textarea spellcheck="false" rows="${content.split('\n').length}">${content}</textarea>
          <div class="output-area"></div>
        </div>
      `;
      container.appendChild(cell);
    }
  });

  // UI Logic
  document.getElementById('theme-toggle').onclick = () => document.body.classList.toggle('dark-mode');

  const btnStart = document.getElementById('btn-start');
  const btnStop = document.getElementById('btn-stop');
  const statusDot = document.getElementById('status-indicator');
  let isRunning = false;

  btnStart.onclick = () => {
    if (typeof Module !== 'undefined' && Module._skred_start) {
      Module._skred_start(128, 16, 0);
      isRunning = true;
      btnStart.disabled = true; btnStop.disabled = false;
      statusDot.classList.add('active');
      Module.ccall('skred_command', null, ['string'], ['log 1']);
    }
  };

  btnStop.onclick = () => {
    Module._skred_stop();
    isRunning = false;
    btnStart.disabled = false; btnStop.disabled = true;
    statusDot.classList.remove('active');
  };

  document.getElementById('btn-quiet').onclick = () => {
    if(isRunning) Module.ccall('skred_command', null, ['string'], ['S10000']);
  };

  // Execution logic
  document.addEventListener('click', (e) => {
    const runBtn = e.target.closest('.run-btn');
    if (!runBtn || !isRunning) return;

    const cell = runBtn.closest('.code-cell');
    const textarea = cell.querySelector('textarea');
    const outputArea = cell.querySelector('.output-area');
    const lines = textarea.value.split('\n');
    let combinedLog = "";

    lines.forEach(line => {
      const cmd = line.trim();
      if (cmd) {
        Module.ccall('skred_command', null, ['string'], [cmd]);
        const ptr = Module._skred_log();
        const log = Module.UTF8ToString(ptr);
        if (log && log.trim()) combinedLog += log + "\n";
      }
    });

    if (combinedLog.trim()) {
      outputArea.textContent = combinedLog.trim();
      outputArea.classList.add('active');
    } else {
      outputArea.classList.remove('active');
    }
  });
</script>
