<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skred – Embedded Sound & Pattern Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #fcfcfc;
            --text-color: #222222;
            --text-muted: #555555;
            --border-color: #dddddd;
            --link-color: #0066cc;
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }

        body {
            font-family: var(--font-stack);
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--bg-color);
            max-width: 680px;
            margin: 40px auto;
            padding: 0 20px;
        }

        header {
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin: 0 0 10px 0;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin: 0;
        }

        a { color: var(--link-color); text-decoration: none; }
        a:hover { text-decoration: underline; }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            margin: 30px 0;
            background: #000;
            border-radius: 4px;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; border: 0;
        }

        /* Styling for the Markdown generated content */
        #content h2 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-top: 30px;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
        }

        #content ul { padding-left: 20px; margin: 0; }
        #content li { margin-bottom: 10px; }
        #content strong { font-weight: 600; }

        footer {
            margin-top: 50px;
            font-size: 0.9rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <h1>Skred</h1>
        <p class="subtitle">
        This is the sound engine, pattern engine, and live coding environment
        for wavetable and sample-based audio synthesis that I've wanted for
        40 years. It's a mess. It a mess that I really like playing with.
        </p>
    </header>

    <main>
        <div class="video-wrapper">
            <iframe 
                src="https://www.youtube-nocookie.com/embed/ZQMo596OA1w" 
                title="Skred SMPL feature walkthrough" 
                crossorigin="anonymous"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </div>

        <div id="content"></div>
    </main>

    <footer>
        <p>Skred is open source under the MIT License.</p>
    </footer>

    <script type="text/markdown" id="markdown-source">
## About this demo

* **Multi-Track Sequencing:** Features a drum pattern layout where each individual patch resides on a separate track, running independent delay configurations.
* **Sample Asset Handling:** Track 3 demonstrates sample playback by loading an alto flute WAV file and respecting its embedded loop tags.
* **Compare to ...:** Read about the Skred's core goals, implementation criteria, and technical comparisons directly in the [PULP Documentation Repository](https://github.com/octetta/pulp/blob/main/parts/COMPARISONS.md).

## Other info

* I did a lightning talk at ElixirConf.eu in Malaga in April 2026 about the ASCII language SKODE https://youtu.be/SnJ0osgiqWM?si=O9Uv9lHX0F8fOeFm

* I did a full talk about PULP, Skred, SKODE, and k-synth at the June 2026 Audio Developer's Conference in Tokyo... that video isn't online, but my slides/notes are here:

  - https://octetta.github.io/pulp/doc/tokyo-adc-stage.html
  
  - https://octetta.github.io/pulp/doc/tokyo-adc-notes.html

* Lots of random, rambling videos on my YT channel https://www.youtube.com/@octetta

    </script>

    <script>
        document.getElementById('markdown-source').style.display = 'none';
        document.getElementById('content').innerHTML = 
        marked.parse(document.getElementById('markdown-source').textContent);
    </script>
</body>
</html>
