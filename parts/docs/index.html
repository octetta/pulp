<!DOCTYPE html>
<html>
<head>
    <title>wasm-skred shell</title>

    <style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

:root {
    --atari-blue: #0042ff;
    --atari-dark: #001a66;
    --atari-gold: #ffd700;
    --atari-light: #90b0ff;
    --atari-rust: #A03000;   /* Use for Errors */
    --atari-grass: #50B000;  /* Use for successful WASM Boots */
}

body {
    background-color: #000000; 
    display: flex;
    flex-direction: column;
    /* Use dynamic viewport height for mobile browsers */
    height: 100dvh; 
    margin: 0;
    overflow: hidden; 
}

#terminal-container {
    background-color: var(--atari-blue);
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

#output {
    flex-grow: 1;
    overflow-y: auto;
    padding: 20px;
    white-space: pre-wrap;
    line-height: 1.5;
    /* Smooth scrolling for touch */
    -webkit-overflow-scrolling: touch; 
}

.terminal-spacer {
    height: 70%;
    width: 100%;
}

.input-line {
    display: flex;
    align-items: center;
    padding: 20px;
    background: var(--atari-dark);
    border-top: 2px solid #001a66;
    flex-shrink: 0;
    /* Critical for iPhones with home bars */
    padding-bottom: calc(20px + env(safe-area-inset-bottom));
}

.extra-line {
    font-family: 'Press Start 2P', cursive;
    font-size: 16px; 
    color: var(--atari-light);
}

#output, #cmdInput, .prompt, .status-bar {
    font-family: 'Press Start 2P', cursive;
    font-size: 16px; 
    color: var(--atari-light);
}

#cmdInput {
    background: transparent;
    border: none;
    outline: none;
    flex-grow: 1;
    color: #ffffff;
    /* Prevents iOS from zooming in on focus */
    font-size: 16px; 
}

/* Responsive Scaling */
@media (max-width: 600px) {
    #output, .prompt, .status-bar {
        font-size: 10px; /* Smaller text for small screens */
    }
    .input-line {
        padding: 15px;
    }
}

.status-bar {
    padding: 10px 20px;
    background: var(--atari-dark);
    color: var(--atari-gold);
    border-bottom: 2px solid #001a66;
    display: flex;
    justify-content: space-between;
    flex-shrink: 0;
}

.system { color: var(--atari-gold); }
.error { color: var(--atari-rust); }
.info { color: var(--atari-grass); }

.dim { color: #ffffff; }



#mobile-nav {
    display: none; /* Hidden on desktop */
    position: absolute;
    right: 10px;
    bottom: 80px; /* Positioned above the input line */
    flex-direction: column;
    gap: 10px;
}

#mobile-nav button {
    background: rgba(144, 176, 255, 0.2); /* Faded Atari Light Blue */
    border: 2px solid var(--atari-light);
    color: var(--atari-light);
    font-family: 'Press Start 2P', cursive;
    padding: 15px;
    border-radius: 5px;
    touch-action: manipulation;
}

/* Show only on touch devices */
@media (pointer: coarse) {
    #mobile-nav {
        display: flex;
    }
}

    </style>

</head>
<body>

    <div id="terminal-container">
        <div id="output">
          <div class="terminal-spacer"></div>
Welcome to the skred shell
Type <span class="system">'boot'</span> to initialize audio engine.
Type <span class="system">'help'</span> for engine features.
        </div>

        <div id="mobile-nav">
          <button id="histUp">up</button>
          <button id="histDown">dn</button>
        </div>

        <div class="input-line">
            <span class="prompt">#&nbsp;</span>
            <input type="text" id="cmdInput"
              autofocus
              spellcheck="false"
              autocomplete="off"
              autocorrect="off"
              autocapitalize="off">
        </div>

        <div class="extra-line">
            <span id="extra"></span>
        </div>

        <div class="status-bar">
            <span id="engine-left">wasm-skred 0.1.0</span>
            <span id="engine-center">n/a</span>
            <span id="engine-status">AUDIO OFF</span>
        </div>
        
    </div>

    <script src="skred_api.js"></script>

<script>

var bufsize = 1024;
var nvoices = 16;

function usage() {
  printToTerminal("QUICK REF", 'info');
  printToTerminal("boot (voice-count) (callback-frame-count)");
  printToTerminal("load # select a wav file");
  printToTerminal(`v(0..${nvoices}) # select voice`);
  printToTerminal("w(0..4) # select waveform");
  printToTerminal("a(-60..10) # set amplitide (dB)");
  printToTerminal("f(0..1760) # set frequency (Hz)");
  printToTerminal("n(0..127) # set frequency by MIDI note");
  printToTerminal("t A D S R # set amp envelope (A,D,R in secs)");
  printToTerminal("l(0..4) # trigger ADSR with velocity");
  printToTerminal("p(-1..1) # pan in stereo");
  printToTerminal("modulators A,F,P,C", 'system');
  printToTerminal("(mod) (voice) (depth)");
  printToTerminal("A = amplitude modulation");
  printToTerminal("F = frequency modulation");
  printToTerminal("P = panning modulation");
  printToTerminal("C = phase modulation");
}

const logo = `
     _                 _ 
 ___| | ___ __ ___  __| |
/ __| |/ / '__/ _ \\/ _  |
\\__ \\   <| | |  __/ (_| |
|___/_|\\_\\_|  \\___|\\__,_|
`;
    const output = document.getElementById('output');
    const cmdInput = document.getElementById('cmdInput');
    const statusSpan = document.getElementById('engine-status');
    const leftSpan = document.getElementById('engine-left');
    const centerSpan = document.getElementById('engine-center');

    // History Buffer Logic
    let commandHistory = [];
    let historyIndex = -1;

    function printToTerminal(text, className = '') {
        const line = document.createElement('div');
        if (className) line.className = className;
        line.textContent = text;
        output.appendChild(line);
        output.scrollTop = output.scrollHeight;
    }

    cmdInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const rawCmd = cmdInput.value.trim();
            if (!rawCmd) return;

            // Add to history if it's different from the last command
            if (commandHistory[commandHistory.length - 1] !== rawCmd) {
                commandHistory.push(rawCmd);
            }
            historyIndex = -1; // Reset index for new entries

            printToTerminal(`${rawCmd}`, 'dim');
            processCommand(rawCmd);
            cmdInput.value = '';
        } 
        else if (e.key === 'ArrowUp') {
            // Move back in time
            if (commandHistory.length > 0) {
                if (historyIndex === -1) historyIndex = commandHistory.length - 1;
                else if (historyIndex > 0) historyIndex--;
                
                cmdInput.value = commandHistory[historyIndex];
                // Move cursor to end of input
                setTimeout(() => cmdInput.setSelectionRange(cmdInput.value.length, cmdInput.value.length), 0);
            }
            e.preventDefault();
        } 
        else if (e.key === 'ArrowDown') {
            // Move forward in time
            if (historyIndex !== -1) {
                if (historyIndex < commandHistory.length - 1) {
                    historyIndex++;
                    cmdInput.value = commandHistory[historyIndex];
                } else {
                    historyIndex = -1;
                    cmdInput.value = '';
                }
            }
            e.preventDefault();
        }
    });

    var running = 0;

    function processCommand(cmd) {
        const action = cmd.split(' ')[0].toLowerCase();
        var arg = cmd.split(' ');

        switch(action) {
            case 'boot':
                if (running == 1) {
                    printToTerminal(`Error: already running. Reload to reset.`, 'error');
                    return;
                }
                printToTerminal(logo, 'info');
                if (arg.length > 1) {
                  var n = Number(arg[1]);
                  if (n > 0 || n < 32) nvoices = n;
                  if (arg.length > 2) {
                    n = Number(arg[2]);
                    if (n > 128) bufsize = n;
                  }
                }
                try {
                    // Using your verified test-wasm parameters 
                    const result = Module._skred_start(bufsize, nvoices, 0); 
                    printToTerminal(`skred_start() = ${result}`, 'system');
                    statusSpan.innerText = `AUDIO ON ${nvoices} ${bufsize}`;
                    statusSpan.style.color = "#15ff00";
                    const ptr = Module._skred_features();
                    printToTerminal(`${Module.UTF8ToString(ptr)}`);
                    running = 1;
                } catch(e) {
                    printToTerminal(`Error: Could not boot. Ensure WASM is loaded.`, 'error');
                }
                break;

            case 'stop':
                Module._skred_stop();
                printToTerminal("System: Engine stopped.", "system");
                statusSpan.innerText = "AUDIO OFF";
                statusSpan.style.color = "#aaa";
                break;
            case 'help': usage(); break;
            case 'load':
              addWavViaDialog();
              break;
            case 'clear':
                output.innerHTML = '';
                break;

            default:
                if (statusSpan.innerText === "AUDIO OFF") {
                    printToTerminal("Error: Engine must be 'boot'ed first.");
                } else {
                    // Native call with correct punctuation to avoid SyntaxError 
                    Module.ccall('skred_command', null, ['string'], [cmd]);
                    const ptr = Module._skred_log();
                    const log = Module.UTF8ToString(ptr);
                    if (log != "") {
                      printToTerminal(`${log}`, 'info');
                    }
                }
                break;
        }
    }

const histUp = document.getElementById('histUp');
const histDown = document.getElementById('histDown');

// Helper to trigger the history change
function triggerHistory(direction) {
    const event = new KeyboardEvent('keydown', { key: direction });
    cmdInput.dispatchEvent(event);
    cmdInput.focus();
}

histUp.addEventListener('touchstart', (e) => {
    e.preventDefault();
    triggerHistory('ArrowUp');
});

histDown.addEventListener('touchstart', (e) => {
    e.preventDefault();
    triggerHistory('ArrowDown');
});

    document.addEventListener('click', () => cmdInput.focus());
</script>

<script>
// Persistent state for the file counter
let waveFileCounter = 300;
const MIN_WAV = 300;
const MAX_WAV = 999;

/**
 * Opens a file dialog and writes selected .wav files 
 * to the Emscripten VFS with automatic indexing.
 */
async function addWavViaDialog() {
    // Create a hidden input element
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.mp3,.wav';
    input.multiple = false;

    input.onchange = async (e) => {
        const files = e.target.files;
        
        for (const file of files) {
            console.log(file);
            try {
                const buffer = await file.arrayBuffer();
                const data = new Uint8Array(buffer);
                
                const fileName = `${waveFileCounter}.wav`;
                
                // Write to the Emscripten virtual filesystem
                Module.FS.writeFile(fileName, data);
                
                console.log(`Successfully mapped ${file.name} ${fileName}`);
                centerSpan.innerText = `{${file.name}} /ws ${waveFileCounter}`;
                var cmd = `/w${waveFileCounter},${waveFileCounter}`;
                Module.ccall('skred_command', null, ['string'], [cmd]);

                // Handle the 300-999 wraparound logic
                waveFileCounter++;
                if (waveFileCounter > MAX_WAV) {
                    waveFileCounter = MIN_WAV;
                }
            } catch (err) {
                console.error(`Failed to write ${file.name}:`, err);
            }
        }
    };

    // Trigger the dialog
    input.click();
}
</script>

</body>
</html>
